name: CI / CD

# When this pipeline runs:
# - On every push to the main branch
# - On every pull request that targets main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── These three jobs run in parallel ─────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Check for code style problems — unused variables, bad patterns, inconsistencies
      # Think of it like a grammar checker for code
      - name: Lint
        run: npm run lint


  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Check that all TypeScript types are correct
      # Catches a whole class of bugs before the browser ever sees the code
      - name: Type check
        run: npm run typecheck


  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run the automated test suite with coverage reporting
      # If a change accidentally broke something else, this is where you find out
      - name: Run tests
        run: npm run test:coverage

      # Send coverage results to Codecov so you can track them over time
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


  # ─── Build waits for all three above to pass ──────────────────────────────

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]  # only runs if all three parallel jobs passed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Compile source files into the final HTML, CSS, and JS the browser reads
      # Like exporting a final PDF from Figma — confirms the export actually works
      - name: Build
        run: npm run build


  # ─── Deploy waits for build, only runs on main ────────────────────────────

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build  # only runs if build passed

    # Only deploy when pushing to main — not on pull requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Push the site live to Vercel
      # The three secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID)
      # must be added in your GitHub repo settings under Settings > Secrets
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
